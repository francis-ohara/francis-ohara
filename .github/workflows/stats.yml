name: Update GitHub stats

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats cards
        run: node scripts/generate-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional PAT with repo read access; when set, private repos count
          # toward the language card (aggregates only, no repo names exposed).
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats-card.svg assets/langs-card.svg
          git diff --cached --quiet || git commit -m "chore: refresh stats cards"
          git push
